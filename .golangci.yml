version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused
    - bodyclose
    - misspell
  settings:
    errcheck:
      check-type-assertions: true
    govet:
      enable:
        - shadow
    nolintlint:
      require-explanation: true
      require-specific: true
      allow-unused: false

formatters:
  enable:
    - gofmt

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

output:
  formats:
    text:
      colors: true

severity:
  default: error